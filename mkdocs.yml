site_name: 游离域/Yulliil Zone
site_url: https://blog.yulliil.moe
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  language: zh
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.top

plugins:
  - search:
      separator: '[\s\u200b\-]'
  - blog:
      enabled: true
      blog_dir: ./
      post_readtime: true
      post_readtime_words_per_minute: 300
  - tags

nav:
  - 游离域:
    - index.md
  - posts/about.md

markdown_extensions:
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  alternate:
    - name: 中文
      link: /zh/
      lang: zh
    - name: English
      link: /en/
      lang: en
